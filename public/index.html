<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Smart AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Prompt', sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; 
        }
        #chat-container { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(10px);
            width: 450px; height: 650px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.5);
        }
        #header {
            background: #ffffff;
            padding: 15px 20px;
            display: flex; align-items: center;
            border-bottom: 1px solid #eee;
        }
        .bot-avatar {
            font-size: 30px; margin-right: 15px;
            background: #f0f2f5; padding: 10px; border-radius: 50%;
            width: 30px; height: 30px; display: flex; justify-content: center; align-items: center;
        }
        .bot-name-title { font-size: 18px; font-weight: 500; color: #333; margin: 0; }
        .bot-status { font-size: 12px; color: #28a745; margin: 0; }
        
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        .message-wrapper { display: flex; margin-bottom: 15px; width: 100%; }
        .message { padding: 12px 18px; font-size: 15px; line-height: 1.5; max-width: 75%; word-wrap: break-word; }
        
        .user-wrapper { justify-content: flex-end; }
        .user-msg { background: #007aff; color: white; border-radius: 18px 18px 0 18px; box-shadow: 0 2px 5px rgba(0,122,255,0.2); }
        
        .bot-wrapper { justify-content: flex-start; }
        .bot-msg { background: #e5e5ea; color: #333; border-radius: 18px 18px 18px 0; }
        
        #input-area { display: flex; padding: 15px; background: #ffffff; border-top: 1px solid #eee; }
        #user-input { flex: 1; padding: 12px 15px; font-size: 15px; border: 1px solid #ddd; border-radius: 25px; outline: none; font-family: 'Prompt', sans-serif; background: #f9f9f9; }
        #user-input:focus { border-color: #007aff; }
        
        .action-btn { border: none; padding: 10px 15px; margin-left: 8px; border-radius: 20px; cursor: pointer; font-size: 14px; font-family: 'Prompt', sans-serif; transition: 0.2s; }
        #send-btn { background: #007aff; color: white; }
        #send-btn:hover { background: #005bb5; }
        #clear-btn { background: #f1f3f5; color: #555; }
        #clear-btn:hover { background: #e2e6ea; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">
        <div class="bot-avatar">🐱</div> <div>
            <p class="bot-name-title">เหมียวจีเนียส (MeowGenius)</p>
            <p class="bot-status">● ออนไลน์</p>
        </div>
    </div>

    <div id="chat-box">
        <div class="message-wrapper bot-wrapper">
            <div class="message bot-msg">สวัสดีเหมี๊ยว! เหมียวพร้อมมาช่วยคุณแล้วนะเหมี๊ยว!</div>
        </div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="พิมพ์ข้อความ..." onkeypress="handleKeyPress(event)">
        <button id="send-btn" class="action-btn" onclick="sendMessage()">ส่ง</button>
        <button id="clear-btn" class="action-btn" onclick="clearChat()">ล้างแชท</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const message = inputField.value.trim();
        if (!message) return;

        appendMessage(message, "user");
        inputField.value = "";

        const botLoadingId = appendMessage("กำลังคิด...", "bot");

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: message })
            });
            const data = await response.json();
            document.getElementById(botLoadingId).innerHTML = data.reply.replace(/\n/g, "<br>");
        } catch (error) {
            document.getElementById(botLoadingId).innerText = "❌ เกิดข้อผิดพลาดในการเชื่อมต่อ";
        }
    }

    function appendMessage(text, sender) {
        const chatBox = document.getElementById("chat-box");
        const wrapperDiv = document.createElement("div");
        wrapperDiv.className = "message-wrapper " + sender + "-wrapper";
        
        const msgDiv = document.createElement("div");
        msgDiv.className = "message " + sender + "-msg";
        msgDiv.innerHTML = text;
        
        const msgId = "msg-" + Date.now();
        msgDiv.id = msgId;
        
        wrapperDiv.appendChild(msgDiv);
        chatBox.appendChild(wrapperDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        return msgId;
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") sendMessage();
    }

    async function clearChat() {
        const chatBox = document.getElementById("chat-box");
        chatBox.innerHTML = '<div class="message-wrapper bot-wrapper"><div class="message bot-msg">เคลียร์หน้าจอและความจำเรียบร้อยแล้ว! เริ่มคุยเรื่องใหม่ได้เลยครับ</div></div>';
        await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: "CLEAR_CHAT_MEMORY" })
        });
    }
</script>

</body>
</html>
